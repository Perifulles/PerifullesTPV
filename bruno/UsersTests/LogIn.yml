info:
  name: LogIn
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8000/api/auth/login
  headers:
    - name: Content-Type
      value: application/json
    - name: X-Restaurant-Uuid
      value: "{{restaurant_uuid}}"
  body:
    type: json
    data: |-
      {
          "email": "admin@tpv.com",
          "password": "password"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
